services:
  # LLM Balancer Backend
  llm-balancer:
    build:
      context: .
      dockerfile: docker/balancer/Dockerfile
    container_name: llm-balancer-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DEBUG=true
    volumes:
      - ./llm-balancer/config.json:/app/config.json:rw
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # LLM Balancer Frontend
  llm-balancer-frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: llm-balancer-frontend
    restart: unless-stopped
    ports:
      - "3080:3080"
    depends_on:
      llm-balancer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3080/"]
      interval: 10s
      timeout: 5s
      retries: 3
